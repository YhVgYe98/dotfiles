set -g prefix C-a
unbind C-b
# 连按两次 Ctrl + a 向终端发送原有的 Ctrl + a 命令
bind C-a send-prefix

bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
set -g mouse

# 复制模式使用 vi 键位
set -g mode-keys vi
# v 开始选择（覆盖默认的 rectangle-toggle，符合 vim 习惯）
bind -T copy-mode-vi v send-keys -X begin-selection
# y 复制但不退出选择模式（copy-selection-no-clear 保留选区并留在 copy mode）
bind -T copy-mode-vi y send-keys -X copy-selection

# 鼠标拖选松开：复制到缓冲区并清空选区，但留在复制模式（手动 q / Esc 退出）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe

set -g status-right "[#{pane_index}#{pane_id}] | %Y-%m-%d %H:%M"

set -g extended-keys on
set -g extended-keys-format csi-u

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
